<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Garmin Treningsplanlegger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:   #00d4aa;
      --violet: #7b2fff;
      --blue:   #3a86ff;
      --green:  #06ffa5;
      --t1: rgba(255,255,255,0.92);
      --t2: rgba(255,255,255,0.50);
      --t3: rgba(255,255,255,0.28);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: #030810;
      color: var(--t1);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* Ensure aurora fills behind everything including safe-area */
    html { background: #030810; }

    /* ── Aurora ──────────────────────────────────────────── */
    /* NOTE: No ::after overlay here — it was covering the blobs */
    #aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      will-change: transform;
    }

    /* Top-left: teal */
    .b1 {
      width: min(80vw, 520px); height: min(80vw, 520px);
      top: -22%; left: -22%;
      background: radial-gradient(circle, rgba(0,220,160,0.92) 0%, rgba(0,180,140,0.42) 45%, transparent 72%);
      filter: blur(80px);
      animation: f1 9s ease-in-out infinite;
    }
    /* Top-right: violet */
    .b2 {
      width: min(90vw, 580px); height: min(90vw, 580px);
      top: -26%; right: -26%;
      background: radial-gradient(circle, rgba(140,55,255,0.88) 0%, rgba(100,35,220,0.38) 45%, transparent 72%);
      filter: blur(90px);
      animation: f2 11s ease-in-out infinite;
    }
    /* Mid-left: blue */
    .b3 {
      width: min(65vw, 420px); height: min(65vw, 420px);
      top: 38%; left: -16%;
      background: radial-gradient(circle, rgba(40,140,255,0.8) 0%, rgba(20,90,220,0.32) 45%, transparent 72%);
      filter: blur(75px);
      animation: f3 8s ease-in-out infinite;
    }
    /* Bottom-right: green */
    .b4 {
      width: min(72vw, 460px); height: min(72vw, 460px);
      bottom: -18%; right: -18%;
      background: radial-gradient(circle, rgba(6,255,150,0.75) 0%, rgba(0,200,120,0.32) 45%, transparent 72%);
      filter: blur(85px);
      animation: f4 10s ease-in-out infinite;
    }
    /* Drifting accent: magenta */
    .b5 {
      width: min(48vw, 300px); height: min(48vw, 300px);
      top: 44%; left: 22%;
      background: radial-gradient(circle, rgba(255,40,120,0.7) 0%, rgba(200,0,90,0.28) 45%, transparent 72%);
      filter: blur(65px);
      animation: f5 13s ease-in-out infinite;
    }
    /* Bottom-center: teal fill so there's no black gap */
    .b6 {
      width: min(90vw, 560px); height: min(90vw, 560px);
      bottom: -30%; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle, rgba(0,160,130,0.55) 0%, rgba(0,100,90,0.22) 45%, transparent 70%);
      filter: blur(100px);
      animation: f6 16s ease-in-out infinite;
    }

    @keyframes f1 {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%     { transform: translate(22vw, 16vh) scale(1.22); }
      66%     { transform: translate(10vw, 32vh) scale(0.84); }
    }
    @keyframes f2 {
      0%,100% { transform: translate(0, 0) scale(1); }
      40%     { transform: translate(-24vw, 18vh) scale(0.86); }
      70%     { transform: translate(-12vw, 38vh) scale(1.18); }
    }
    @keyframes f3 {
      0%,100% { transform: translate(0, 0) scale(1); }
      30%     { transform: translate(20vw, -14vh) scale(1.16); }
      65%     { transform: translate(30vw,  8vh) scale(0.88); }
    }
    @keyframes f4 {
      0%,100% { transform: translate(0, 0) scale(1); }
      35%     { transform: translate(-18vw, -22vh) scale(1.2); }
      70%     { transform: translate(-28vw,  -8vh) scale(0.86); }
    }
    @keyframes f5 {
      0%,100% { transform: translate(0, 0);         opacity: 0.85; }
      25%     { transform: translate(-22vw, -14vh);  opacity: 1; }
      50%     { transform: translate(-10vw, -30vh);  opacity: 0.55; }
      75%     { transform: translate(18vw,  -18vh);  opacity: 1; }
    }
    @keyframes f6 {
      0%,100% { transform: translateX(-50%) translate(0, 0)    scale(1); }
      50%     { transform: translateX(-50%) translate(8vw, -8vh) scale(1.15); }
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: transparent;
      pointer-events: none;
    }

    #user-info {
      display: none; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,0.88);
      pointer-events: all;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }

    .pill {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.8);
      padding: 6px 15px; border-radius: 100px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .pill:active { background: rgba(255,255,255,0.18); }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      position: relative; z-index: 10;
      max-width: 440px; margin: 0 auto;
      padding: 24px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    /* ── Glass card ──────────────────────────────────────── */
    .card {
      position: relative;
      background: linear-gradient(160deg,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.03) 55%,
        rgba(255,255,255,0.05) 100%
      );
      backdrop-filter: blur(32px) saturate(140%) brightness(1.04);
      -webkit-backdrop-filter: blur(32px) saturate(140%) brightness(1.04);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.18);
      border-bottom-color: rgba(0,0,0,0.1);
      padding: 28px 22px;
      overflow: hidden;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.1) inset,
        0 30px 70px rgba(0,0,0,0.55),
        0 0 0 0.5px rgba(255,255,255,0.06);
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.38) 35%,
        rgba(255,255,255,0.52) 50%,
        rgba(255,255,255,0.38) 65%,
        transparent
      );
    }
    .card::after {
      content: '';
      position: absolute; top: 6%; bottom: 6%; left: 0; width: 1px;
      background: linear-gradient(180deg,
        transparent,
        rgba(0,212,170,0.45),
        rgba(123,47,255,0.3),
        rgba(58,134,255,0.45),
        transparent
      );
    }

    .card-title {
      font-size: 28px; font-weight: 800; letter-spacing: -0.7px;
      line-height: 1.15;
      margin-bottom: 22px;
    }
    .card-title em {
      display: block;
      font-style: normal;
      font-size: 19px; font-weight: 600; letter-spacing: -0.3px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    /* ── Form ────────────────────────────────────────────── */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 10.5px; font-weight: 700;
      color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"],
    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      font-size: 16px; color: var(--t1);
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color .18s, background .18s, box-shadow .18s;
    }
    input:focus {
      border-color: rgba(0,212,170,0.6);
      background: rgba(0,212,170,0.04);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.09);
    }
    input::placeholder { color: var(--t3); }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(.5); cursor: pointer; padding: 2px;
    }

    /* ── Date quick-select ───────────────────────────────── */
    .date-pills {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .dp {
      padding: 15px 8px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      color: var(--t1);
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s;
      line-height: 1.2;
    }
    .dp span { display: block; font-size: 12px; font-weight: 400; color: var(--t2); margin-top: 3px; }
    .dp:active, .dp.sel {
      background: rgba(0,212,170,0.13);
      border-color: rgba(0,212,170,0.42);
      color: var(--teal);
    }
    .dp.sel span { color: rgba(0,212,170,0.7); }

    /* ── Drop zone ───────────────────────────────────────── */
    .dz {
      border: 1.5px dashed rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 28px 16px;
      text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.022);
      margin-bottom: 14px;
      transition: all .22s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .dz:active, .dz.over {
      border-color: rgba(0,212,170,0.5);
      background: rgba(0,212,170,0.04);
    }
    .dz.has-file {
      border-style: solid;
      border-color: rgba(6,255,165,0.35);
      background: rgba(6,255,165,0.04);
      padding: 20px 16px;
    }

    .dz-icon { font-size: 36px; display: block; margin-bottom: 8px; }
    .dz.has-file .dz-icon { display: none; }

    .dz-main { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 4px; }
    .dz.has-file .dz-main { display: none; }

    .dz-hint { font-size: 12px; color: var(--t3); line-height: 1.6; }
    .dz.has-file .dz-hint { display: none; }

    /* File selected state */
    .dz-selected { display: none; align-items: center; gap: 12px; }
    .dz.has-file .dz-selected { display: flex; }
    .dz-badge {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(6,255,165,0.15);
      color: var(--green);
      border: 1px solid rgba(6,255,165,0.25);
    }
    .dz-badge.type-json { background: rgba(0,212,170,0.15); color: var(--teal); border-color: rgba(0,212,170,0.28); }
    .dz-badge.type-fit  { background: rgba(58,134,255,0.15); color: #7cb9ff; border-color: rgba(58,134,255,0.28); }
    .dz-fname {
      flex: 1; text-align: left; min-width: 0;
      font-size: 13.5px; font-weight: 600; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dz-change {
      flex-shrink: 0;
      font-size: 12px; color: var(--t2);
      text-decoration: underline; text-underline-offset: 2px;
    }

    /* ── Button ──────────────────────────────────────────── */
    .btn {
      width: 100%; min-height: 52px;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; letter-spacing: -0.15px;
      color: #fff; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 6px 28px rgba(0,212,170,0.28),
        0 0 0 0.5px rgba(0,212,170,0.28);
      transition: transform .12s, box-shadow .12s;
      margin-top: 8px;
    }
    .btn::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left .42s;
    }
    .btn:active::after { left: 100%; }
    .btn:active:not(:disabled) {
      transform: scale(0.975);
      box-shadow: 0 2px 12px rgba(0,212,170,0.2);
    }
    .btn:disabled { opacity: .28; cursor: not-allowed; box-shadow: none; }

    /* ── Alerts ──────────────────────────────────────────── */
    .alert {
      display: none;
      padding: 12px 14px; border-radius: 11px;
      margin-top: 12px;
      font-size: 13px; line-height: 1.5;
      border: 1px solid;
    }
    .alert-success { background: rgba(6,255,165,0.07); border-color: rgba(6,255,165,0.22); color: #06ffa5; }
    .alert-error   { background: rgba(255,0,110,0.07); border-color: rgba(255,0,110,0.22); color: #ff4d8d; }
    .alert-warning { background: rgba(255,190,0,0.07); border-color: rgba(255,190,0,0.22); color: #ffbe00; }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.22); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      margin-right: 7px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PIN grid ────────────────────────────────────────── */
    .pin-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 8px 0 24px;
    }
    .pin-box {
      width: 88px; height: 76px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      font-size: 30px; font-weight: 700; letter-spacing: 6px;
      color: #fff; text-align: center;
      -webkit-appearance: none; appearance: none;
      outline: none;
      caret-color: transparent;
      transition: border-color .18s, background .18s, box-shadow .18s;
      padding: 0 0 0 6px;
    }
    .pin-box:focus {
      border-color: rgba(0,212,170,0.65);
      background: rgba(0,212,170,0.06);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    .pin-box.filled {
      border-color: rgba(0,212,170,0.35);
      background: rgba(0,212,170,0.04);
    }
    .pin-sep {
      font-size: 26px; font-weight: 300;
      color: rgba(255,255,255,0.3);
      user-select: none; pointer-events: none;
      margin-bottom: 2px;
    }

    #file-input     { display: none; }
    #pin-section    { display: none; }
    #login-section  { display: block; }
    #upload-section { display: none; }
  </style>
</head>
<body>

<div id="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
  <div class="blob b6"></div>
</div>

<header>
  <div id="user-info">
    <span id="display-name"></span>
    <button class="pill" onclick="logout()">Logg ut</button>
  </div>
</header>

<main>

  <div class="card" id="pin-section">
    <div class="card-title">Lås opp</div>
    <form id="pin-form" onsubmit="doPin(event)">
      <div class="pin-grid">
        <input class="pin-box" id="p0" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" autocomplete="one-time-code"
               placeholder="XX">
        <span class="pin-sep">:</span>
        <input class="pin-box" id="p1" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" placeholder="XX">
        <span class="pin-sep">:</span>
        <input class="pin-box" id="p2" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" placeholder="XX">
      </div>
    </form>
    <div class="alert" id="pin-alert"></div>
  </div>

  <div class="card" id="login-section">
    <div class="card-title">Garmin Connect</div>
    <div class="card-sub">Logg inn med din Garmin Connect konto</div>
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label>E-post</label>
        <input type="email" id="email" placeholder="din@epost.no"
               required autocomplete="email">
      </div>
      <div class="field">
        <label>Passord</label>
        <input type="password" id="password" placeholder="••••••••"
               required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-btn">Logg inn</button>
    </form>
    <div class="alert" id="login-alert"></div>
  </div>

  <div class="card" id="upload-section">
    <div class="card-title">Last opp økt<em>til Garmin Connect</em></div>

    <!-- File picker -->
    <div class="dz" id="dz"
         onclick="document.getElementById('file-input').click()"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
      <span class="dz-icon">📂</span>
      <div class="dz-main">Trykk for å velge fil</div>
      <div class="dz-hint">
        <b>JSON</b> for planlagte fremtidige økter
        &nbsp;·&nbsp; FIT / TCX / GPX for aktiviteter
      </div>
      <!-- Selected state -->
      <div class="dz-selected">
        <div class="dz-badge" id="file-badge">JSON</div>
        <div class="dz-fname" id="file-label"></div>
        <div class="dz-change">Bytt</div>
      </div>
    </div>
    <input type="file" id="file-input" accept=".json,.fit,.tcx,.gpx"
           onchange="onFileInput(this)">

    <!-- Date picker -->
    <div class="field">
      <label>
        Planlegg til dato
        <span style="opacity:.38;font-weight:400;text-transform:none;letter-spacing:0"> — valgfritt</span>
      </label>
      <input type="date" id="sched-date">
      <div class="date-pills">
        <button type="button" class="dp" onclick="setDate(0,this)">I dag<span id="date-today"></span></button>
        <button type="button" class="dp" onclick="setDate(1,this)">I morgen<span id="date-tomorrow"></span></button>
      </div>
    </div>

    <button class="btn" id="upload-btn" onclick="doUpload()" disabled>
      Last opp til Garmin
    </button>
    <div class="alert" id="upload-alert"></div>
  </div>

</main>

<script>
  let sel = null;

  const dateInput = document.getElementById('sched-date');
  const today = new Date();
  dateInput.min = today.toISOString().slice(0,10);
  dateInput.addEventListener('change', () => {
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
  });

  // Fill date labels in quick-select buttons
  const fmt = d => d.toLocaleDateString('no-NO', { day: 'numeric', month: 'short' });
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  document.getElementById('date-today').textContent    = fmt(today);
  document.getElementById('date-tomorrow').textContent = fmt(tomorrow);

  function setDate(days, btn) {
    const d = new Date();
    d.setDate(d.getDate() + days);
    dateInput.value = d.toISOString().slice(0,10);
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
    btn.classList.add('sel');
  }

  async function init() {
    const r = await fetch('/api/status').catch(() => null);
    if (!r) { show('login'); return; }
    if (r.status === 401) { show('pin'); return; }
    const d = await r.json();
    d.loggedIn ? setIn(d.displayName) : show('login');
  }

  function show(n) {
    ['pin','login','upload'].forEach(s =>
      document.getElementById(s + '-section').style.display = s === n ? 'block' : 'none');
    if (n === 'pin') {
      setTimeout(() => document.getElementById('p0').focus(), 60);
    }
  }

  function setIn(name) {
    show('upload');
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('display-name').textContent = name;
  }

  // ── PIN boxes ─────────────────────────────────────────────
  const pinBoxes = [
    document.getElementById('p0'),
    document.getElementById('p1'),
    document.getElementById('p2'),
  ];

  pinBoxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      // strip non-digits, enforce max 2
      box.value = box.value.replace(/\D/g, '').slice(0, 2);
      box.classList.toggle('filled', box.value.length > 0);
      if (box.value.length === 2) {
        if (i < 2) {
          pinBoxes[i + 1].focus();
        } else {
          // last box filled — auto-submit
          document.getElementById('pin-form').requestSubmit();
        }
      }
    });

    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && box.value === '' && i > 0) {
        e.preventDefault();
        const prev = pinBoxes[i - 1];
        prev.value = prev.value.slice(0, -1);
        prev.classList.toggle('filled', prev.value.length > 0);
        prev.focus();
      }
    });

    // handle paste across all boxes (e.g. from SMS OTP)
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      pinBoxes.forEach((b, j) => {
        b.value = digits.slice(j * 2, j * 2 + 2);
        b.classList.toggle('filled', b.value.length > 0);
      });
      if (digits.length === 6) {
        document.getElementById('pin-form').requestSubmit();
      } else {
        const next = pinBoxes[Math.min(Math.floor(digits.length / 2), 2)];
        next.focus();
      }
    });
  });

  async function doPin(e) {
    if (e) e.preventDefault();
    const pin = pinBoxes.map(b => b.value).join('');
    if (pin.length < 6) {
      alert2('pin-alert', 'Skriv inn alle 6 sifrene', 'error');
      return;
    }
    alert2('pin-alert', '', '');
    pinBoxes.forEach(b => { b.disabled = true; });
    try {
      const fd = new FormData();
      fd.append('pin', pin);
      const r = await fetch('/api/pin', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        const s = await (await fetch('/api/status')).json();
        s.loggedIn ? setIn(s.displayName) : show('login');
      } else {
        alert2('pin-alert', d.detail || 'Feil PIN', 'error');
        pinBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); b.disabled = false; });
        pinBoxes[0].focus();
      }
    } catch(e) {
      alert2('pin-alert', 'Nettverksfeil', 'error');
      pinBoxes.forEach(b => { b.disabled = false; });
    }
  }

  async function doLogin(e) {
    e.preventDefault();
    const b = document.getElementById('login-btn');
    alert2('login-alert', '', '');
    b.disabled = true; b.innerHTML = '<span class="spinner"></span>Logger inn…';
    try {
      const fd = new FormData();
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      const r = await fetch('/api/login', { method: 'POST', body: fd });
      const d = await r.json();
      r.ok ? setIn(d.displayName) : alert2('login-alert', d.detail || 'Innlogging feilet', 'error');
    } catch(e) { alert2('login-alert', 'Nettverksfeil', 'error'); }
    finally { b.disabled = false; b.innerHTML = 'Logg inn'; }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    sel = null;
    document.getElementById('dz').classList.remove('has-file');
    document.getElementById('file-label').textContent = '';
    document.getElementById('upload-btn').disabled = true;
    alert2('upload-alert', '', '');
    document.getElementById('user-info').style.display = 'none';
    show('login');
  }

  function onDragOver(e) { e.preventDefault(); document.getElementById('dz').classList.add('over'); }
  function onDragLeave() { document.getElementById('dz').classList.remove('over'); }
  function onDrop(e) {
    e.preventDefault();
    document.getElementById('dz').classList.remove('over');
    const f = e.dataTransfer.files[0]; if (f) setFile(f);
  }
  function onFileInput(i) { if (i.files[0]) setFile(i.files[0]); }

  function setFile(f) {
    sel = f;
    const ext = f.name.split('.').pop().toLowerCase();
    const badge = document.getElementById('file-badge');
    badge.textContent = ext.toUpperCase();
    badge.className = 'dz-badge type-' + (ext === 'json' ? 'json' : 'fit');
    document.getElementById('file-label').textContent = f.name;
    document.getElementById('dz').classList.add('has-file');
    document.getElementById('upload-btn').disabled = false;
    alert2('upload-alert', '', '');
  }

  async function doUpload() {
    if (!sel) return;
    const b = document.getElementById('upload-btn');
    const dv = dateInput.value;
    b.disabled = true; b.innerHTML = '<span class="spinner"></span>Laster opp…';
    alert2('upload-alert', '', '');
    try {
      const fd = new FormData();
      fd.append('file', sel);
      if (dv) fd.append('scheduled_date', dv);
      const r = await fetch('/api/upload', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        alert2('upload-alert', d.message, d.scheduled ? 'success' : 'warning');
        if (d.scheduled) reset();
      } else {
        alert2('upload-alert', d.detail || 'Opplasting feilet', 'error');
      }
    } catch(e) { alert2('upload-alert', 'Nettverksfeil', 'error'); }
    finally { b.disabled = !sel; b.innerHTML = 'Last opp til Garmin'; }
  }

  function reset() {
    sel = null;
    document.getElementById('dz').classList.remove('has-file');
    document.getElementById('file-label').textContent = '';
    document.getElementById('file-input').value = '';
    dateInput.value = '';
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
    document.getElementById('upload-btn').disabled = true;
  }

  function alert2(id, msg, type) {
    const el = document.getElementById(id);
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.style.display = 'block';
  }

  init().catch(() => show('login'));
</script>
</body>
</html>
