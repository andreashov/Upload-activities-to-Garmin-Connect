<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Garmin Treningsplanlegger</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0f2e20">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:   #00d4aa;
      --violet: #7b2fff;
      --blue:   #3a86ff;
      --green:  #06ffa5;
      --t1: rgba(255,255,255,0.92);
      --t2: rgba(255,255,255,0.50);
      --t3: rgba(255,255,255,0.28);
    }

    html {
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
      background: #000 linear-gradient(180deg, #000 0%, #040c14 12%, #061618 35%, #0a2019 65%, #0f2e20 100%);
      background-attachment: scroll;
      margin: 0;
      padding: 0;
      min-height: 100dvh;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: transparent;
      color: var(--t1);
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Aurora ──────────────────────────────────────────── */
    #aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(180deg,
        #040c14 0%,
        #061618 30%,
        #0a2019 60%,
        #0f2e20 100%
      );
    }

    /* Top fade to black — applies on all pages since aurora is fixed */
    #aurora::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        #000000 0%,
        rgba(0,0,0,0.6) 8%,
        rgba(0,0,0,0.15) 16%,
        transparent 26%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* Bottom fill — glow that always reaches the very bottom */
    #aurora::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 70%;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(0,180,130,0.35) 30%,
        rgba(0,160,115,0.65) 60%,
        rgba(0,140,100,0.85) 85%,
        rgba(0,120,88,0.95)  100%
      );
      z-index: 1;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      will-change: transform;
    }

    /* Top-left: teal */
    .b1 {
      width: min(80vw, 520px); height: min(80vw, 520px);
      top: -22%; left: -22%;
      background: radial-gradient(circle, rgba(0,220,160,0.92) 0%, rgba(0,180,140,0.42) 45%, transparent 72%);
      filter: blur(80px);
      animation: f1 9s ease-in-out infinite;
    }
    /* Top-right: violet */
    .b2 {
      width: min(90vw, 580px); height: min(90vw, 580px);
      top: -26%; right: -26%;
      background: radial-gradient(circle, rgba(140,55,255,0.88) 0%, rgba(100,35,220,0.38) 45%, transparent 72%);
      filter: blur(90px);
      animation: f2 11s ease-in-out infinite;
    }
    /* Mid-left: blue */
    .b3 {
      width: min(65vw, 420px); height: min(65vw, 420px);
      top: 38%; left: -16%;
      background: radial-gradient(circle, rgba(40,140,255,0.8) 0%, rgba(20,90,220,0.32) 45%, transparent 72%);
      filter: blur(75px);
      animation: f3 8s ease-in-out infinite;
    }
    /* Bottom-right: green */
    .b4 {
      width: min(72vw, 460px); height: min(72vw, 460px);
      bottom: -18%; right: -18%;
      background: radial-gradient(circle, rgba(6,255,150,0.75) 0%, rgba(0,200,120,0.32) 45%, transparent 72%);
      filter: blur(85px);
      animation: f4 10s ease-in-out infinite;
    }
    /* Mid-center accent: magenta — enlarged to bridge top/bottom blob gap */
    .b5 {
      width: min(80vw, 500px); height: min(80vw, 500px);
      top: 36%; left: 10%;
      background: radial-gradient(circle, rgba(255,40,120,0.65) 0%, rgba(200,0,90,0.24) 45%, transparent 72%);
      filter: blur(70px);
      animation: f5 13s ease-in-out infinite;
    }
    /* Bottom-center large glow */
    .b6 {
      width: min(160vw, 900px); height: min(160vw, 900px);
      bottom: -38%; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(0,210,160,0.9) 0%, rgba(0,170,130,0.55) 38%, transparent 64%);
      filter: blur(80px);
      animation: f6 16s ease-in-out infinite;
    }
    /* Bottom-right blue accent */
    .b7 {
      width: min(110vw, 680px); height: min(110vw, 680px);
      bottom: -30%; right: -14%;
      background: radial-gradient(circle, rgba(60,100,255,0.72) 0%, rgba(30,60,200,0.32) 45%, transparent 68%);
      filter: blur(90px);
      animation: f4 14s ease-in-out infinite reverse;
    }
    /* Anchored bottom glow — always covers the very bottom of the viewport */
    .b8 {
      position: fixed;
      width: 100vw; height: 50vh;
      bottom: 0; left: 0;
      background: radial-gradient(ellipse at 50% 100%,
        rgba(0,200,150,0.55) 0%,
        rgba(0,160,120,0.28) 45%,
        transparent 70%
      );
      filter: blur(40px);
      pointer-events: none;
    }

    @keyframes f1 {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%     { transform: translate(22vw, 16vh) scale(1.22); }
      66%     { transform: translate(10vw, 32vh) scale(0.84); }
    }
    @keyframes f2 {
      0%,100% { transform: translate(0, 0) scale(1); }
      40%     { transform: translate(-24vw, 18vh) scale(0.86); }
      70%     { transform: translate(-12vw, 38vh) scale(1.18); }
    }
    @keyframes f3 {
      0%,100% { transform: translate(0, 0) scale(1); }
      30%     { transform: translate(20vw, -14vh) scale(1.16); }
      65%     { transform: translate(30vw,  8vh) scale(0.88); }
    }
    @keyframes f4 {
      0%,100% { transform: translate(0, 0) scale(1); }
      35%     { transform: translate(-18vw, -22vh) scale(1.2); }
      70%     { transform: translate(-28vw,  -8vh) scale(0.86); }
    }
    @keyframes f5 {
      0%,100% { transform: translate(0, 0);         opacity: 0.85; }
      25%     { transform: translate(-22vw, -14vh);  opacity: 1; }
      50%     { transform: translate(-10vw, -30vh);  opacity: 0.55; }
      75%     { transform: translate(18vw,  -18vh);  opacity: 1; }
    }
    @keyframes f6 {
      0%,100% { transform: translateX(-50%) translate(0, 0)     scale(1); }
      50%     { transform: translateX(-50%) translate(8vw, -6vh) scale(1.12); }
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: transparent;
      pointer-events: none;
    }

    #user-info {
      display: none; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,0.88);
      pointer-events: all;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }

    .pill {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.8);
      padding: 6px 15px; border-radius: 100px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .pill:active { background: rgba(255,255,255,0.18); }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      position: relative; z-index: 10;
      max-width: 440px; width: 100%; margin: 0 auto;
      box-sizing: border-box;
      padding-top: max(env(safe-area-inset-top), 16px);
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }

    /* ── Desktop: horizontal layout ──────────────────────── */
    @media (min-width: 680px) {
      body { overflow: hidden; }
      main {
        max-width: 820px;
        padding-top: 0;
        padding-bottom: 0;
        display: flex;
        align-items: center;
        min-height: 100dvh;
      }
      main > .card { width: 100%; }

      /* Upload section header row */
      #upload-section {
        padding: 24px 28px 28px;
      }
      #upload-section .login-icon {
        display: inline-block;
        vertical-align: middle;
        margin-bottom: 0;
        margin-right: 14px;
        width: 44px; height: 44px;
        border-radius: 12px;
      }
      #upload-section .card-title {
        display: inline-block;
        vertical-align: middle;
        text-align: left !important;
        margin-bottom: 20px;
      }

      /* Two-column content */
      .upload-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }
      .upload-col-left {
        display: flex;
        flex-direction: column;
      }
      .upload-col-left .dz {
        flex: 1;
        margin-bottom: 0;
      }
      .upload-col-right {
        display: flex;
        flex-direction: column;
      }
      .upload-col-right .field { margin-bottom: 12px; }
      #upload-btn { margin-top: auto; }

      /* Login and PIN sections: stay narrow, centered */
      #login-section,
      #pin-section { max-width: 420px; margin: 0 auto; }
    }

    /* ── Glass card ──────────────────────────────────────── */
    .card {
      position: relative;
      background: linear-gradient(160deg,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.03) 55%,
        rgba(255,255,255,0.05) 100%
      );
      backdrop-filter: blur(32px) saturate(140%) brightness(1.04);
      -webkit-backdrop-filter: blur(32px) saturate(140%) brightness(1.04);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.18);
      border-bottom-color: rgba(0,0,0,0.1);
      padding: 28px 22px;
      overflow: hidden;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.1) inset,
        0 30px 70px rgba(0,0,0,0.55),
        0 0 0 0.5px rgba(255,255,255,0.06);
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.38) 35%,
        rgba(255,255,255,0.52) 50%,
        rgba(255,255,255,0.38) 65%,
        transparent
      );
    }
    .card::after {
      content: '';
      position: absolute; top: 6%; bottom: 6%; left: 0; width: 1px;
      background: linear-gradient(180deg,
        transparent,
        rgba(0,212,170,0.45),
        rgba(123,47,255,0.3),
        rgba(58,134,255,0.45),
        transparent
      );
    }

    .card-title {
      font-size: clamp(22px, 6vw, 28px); font-weight: 800; letter-spacing: -0.7px;
      line-height: 1.15;
      margin-bottom: clamp(12px, 3vh, 22px);
    }
    .card-title em {
      display: block;
      font-style: normal;
      font-size: 19px; font-weight: 600; letter-spacing: -0.3px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    /* All three cards: icon + centered text */
    #pin-section,
    #login-section,
    #upload-section { padding-top: clamp(16px, 4vh, 36px); }

    #pin-section .card-title,
    #login-section .card-title,
    #login-section .card-sub,
    #upload-section .card-title,
    #upload-section .card-title em { text-align: center; }

    #pin-section label,
    #login-section label,
    #upload-section label { text-align: center; }

    #pin-section input,
    #login-section input,
    #upload-section input[type="date"] { text-align: center; }

    /* Hide native date text; the .date-ph overlay renders it centered */
    #sched-date {
      color: transparent;
      -webkit-text-fill-color: transparent;
      caret-color: transparent;
    }

    .login-icon {
      display: block;
      width: clamp(52px, 10vw, 72px); height: clamp(52px, 10vw, 72px);
      margin: 0 auto clamp(12px, 3vh, 20px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 8px 28px rgba(0,0,0,0.45),
        0 0 40px rgba(0,212,170,0.12);
    }
    .login-icon img {
      width: 100%; height: 100%;
      display: block;
    }

    #login-section .card-title {
      font-size: 26px;
      background: linear-gradient(135deg, #00d4aa 0%, #7b2fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    #login-section .field { margin-bottom: 16px; }

    #login-section .btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #00d4aa 0%, #7b2fff 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 6px 32px rgba(0,212,170,0.32),
        0 0 0 0.5px rgba(0,212,170,0.3);
    }

    /* ── Form ────────────────────────────────────────────── */
    .field { margin-bottom: clamp(8px, 2vh, 14px); }

    label {
      display: block;
      font-size: 10.5px; font-weight: 700;
      color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"],
    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      font-size: 16px; color: var(--t1);
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color .18s, background .18s, box-shadow .18s;
    }
    input:focus {
      border-color: rgba(0,212,170,0.6);
      background: rgba(0,212,170,0.04);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.09);
    }
    input::placeholder { color: var(--t3); }
    /* Date input wrapper with overlay placeholder */
    .date-wrap {
      position: relative;
    }
    input[type="date"] {
      min-height: 54px;
      padding: 16px 14px;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(.5); cursor: pointer; padding: 2px;
    }
    .date-ph {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px; color: var(--t3);
      pointer-events: none;
      white-space: nowrap;
    }
    .date-wrap.has-date .date-ph { color: var(--t1); }

    /* ── Date quick-select ───────────────────────────────── */
    .date-pills {
      margin-top: 10px;
    }
    .dp-label {
      font-size: 10.5px; font-weight: 700;
      color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 8px;
    }
    .dp-label span {
      text-transform: none; letter-spacing: 0; font-weight: 400; opacity: 0.65;
    }
    .dp-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .dp {
      padding: clamp(10px, 2vh, 15px) 8px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      color: var(--t1);
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s;
      line-height: 1.2;
    }
    .dp span { display: block; font-size: 12px; font-weight: 400; color: var(--t2); margin-top: 3px; }
    .dp:active, .dp.sel {
      background: rgba(0,212,170,0.13);
      border-color: rgba(0,212,170,0.42);
      color: var(--teal);
    }
    .dp.sel span { color: rgba(0,212,170,0.7); }

    /* ── Drop zone ───────────────────────────────────────── */
    .dz {
      border: 1.5px dashed rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: clamp(14px, 4vh, 28px) 16px;
      text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.022);
      margin-bottom: 14px;
      transition: all .22s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .dz:active, .dz.over {
      border-color: rgba(0,212,170,0.5);
      background: rgba(0,212,170,0.04);
    }
    .dz.has-file {
      border-style: solid;
      border-color: rgba(6,255,165,0.35);
      background: rgba(6,255,165,0.04);
      padding: 20px 16px;
    }

    .dz-icon { font-size: 36px; display: block; margin-bottom: 8px; }
    .dz.has-file .dz-icon { display: none; }

    .dz-main { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 4px; }
    .dz.has-file .dz-main { display: none; }

    .dz-hint { font-size: 12px; color: var(--t3); line-height: 1.6; }
    .dz.has-file .dz-hint { display: none; }

    /* File selected state */
    .dz-selected { display: none; align-items: center; gap: 12px; }
    .dz.has-file .dz-selected { display: flex; }
    .dz-badge {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(6,255,165,0.15);
      color: var(--green);
      border: 1px solid rgba(6,255,165,0.25);
    }
    .dz-badge.type-json { background: rgba(0,212,170,0.15); color: var(--teal); border-color: rgba(0,212,170,0.28); }
    .dz-badge.type-fit  { background: rgba(58,134,255,0.15); color: #7cb9ff; border-color: rgba(58,134,255,0.28); }
    .dz-fname {
      flex: 1; text-align: left; min-width: 0;
      font-size: 13.5px; font-weight: 600; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dz-change {
      flex-shrink: 0;
      font-size: 12px; color: var(--t2);
      text-decoration: underline; text-underline-offset: 2px;
    }

    /* ── Button ──────────────────────────────────────────── */
    .btn {
      width: 100%; min-height: 52px;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; letter-spacing: -0.15px;
      color: #fff; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 6px 28px rgba(0,212,170,0.28),
        0 0 0 0.5px rgba(0,212,170,0.28);
      transition: transform .12s, box-shadow .12s;
      margin-top: 8px;
    }
    .btn::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left .42s;
    }
    .btn:active::after { left: 100%; }
    .btn:active:not(:disabled) {
      transform: scale(0.975);
      box-shadow: 0 2px 12px rgba(0,212,170,0.2);
    }
    .btn:disabled { opacity: .28; cursor: not-allowed; box-shadow: none; }

    /* ── Alerts ──────────────────────────────────────────── */
    .alert {
      display: none;
      padding: 12px 14px; border-radius: 11px;
      margin-top: 12px;
      font-size: 13px; line-height: 1.5;
      border: 1px solid;
    }
    .alert-success { background: rgba(6,255,165,0.07); border-color: rgba(6,255,165,0.22); color: #06ffa5; }
    .alert-error   { background: rgba(255,0,110,0.07); border-color: rgba(255,0,110,0.22); color: #ff4d8d; }
    .alert-warning { background: rgba(255,190,0,0.07); border-color: rgba(255,190,0,0.22); color: #ffbe00; }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.22); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      margin-right: 7px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PIN grid ────────────────────────────────────────── */
    .pin-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 8px 0 24px;
    }
    .pin-box {
      width: 88px; height: 76px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      font-size: 30px; font-weight: 700; letter-spacing: 6px;
      color: #fff; text-align: center;
      -webkit-appearance: none; appearance: none;
      outline: none;
      caret-color: transparent;
      transition: border-color .18s, background .18s, box-shadow .18s;
      padding: 0 0 0 6px;
    }
    .pin-box:focus {
      border-color: rgba(0,212,170,0.65);
      background: rgba(0,212,170,0.06);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    .pin-box.filled {
      border-color: rgba(0,212,170,0.35);
      background: rgba(0,212,170,0.04);
    }
    .pin-sep {
      font-size: 26px; font-weight: 300;
      color: rgba(255,255,255,0.3);
      user-select: none; pointer-events: none;
      margin-bottom: 2px;
    }

    /* ── Kipchoge quote ─────────────────────────────────── */
    .quote-wrap {
      position: relative;
      min-height: 62px;
      margin-bottom: 20px;
    }
    .quote {
      position: absolute;
      top: 0; left: 0; right: 0;
      font-size: 14px; line-height: 1.65;
      color: rgba(255,255,255,0.82);
      font-style: italic; text-align: center;
      text-shadow: 0 1px 12px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity .65s ease;
    }
    .quote.visible { opacity: 1; }
    .quote cite {
      display: block;
      font-style: normal; font-size: 12px;
      color: rgba(0,212,170,0.9);
      margin-top: 5px; letter-spacing: 0.05em;
    }

    /* ── ECG heartbeat ───────────────────────────────────── */
    .ecg {
      display: block;
      width: 100%;
      height: 48px;
      margin-top: 20px;
      overflow: visible;
      pointer-events: none;
      filter:
        drop-shadow(0 0 5px rgba(0,255,200,0.75))
        drop-shadow(0 0 12px rgba(0,200,160,0.45));
    }
    /* On mobile, extend ECG edge-to-edge */
    @media (max-width: 679px) {
      .ecg {
        width: calc(100% + 32px);
        margin-left: -16px; margin-right: -16px;
      }
    }
    .ecg-path {
      stroke-dasharray: 800, 9999;
      stroke-dashoffset: 800;
      animation: ecg-draw 3.2s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes ecg-draw {
      0%   { stroke-dashoffset: 800; opacity: 0; }
      6%   { stroke-dashoffset: 800; opacity: 1; }
      75%  { stroke-dashoffset: 0;   opacity: 1; }
      90%  { stroke-dashoffset: 0;   opacity: 0; }
      100% { stroke-dashoffset: 800; opacity: 0; }
    }

    #file-input     { display: none; }
    #pin-section    { display: none; }
    #login-section  { display: block; }
    #upload-section { display: none; }

    /* ── Mobile: kompakt for å unngå scrolling ───────────── */
    @media (max-width: 679px) {
      main {
        padding-top: max(env(safe-area-inset-top), 8px);
        padding-bottom: max(env(safe-area-inset-bottom), 8px);
      }
      .card { padding: 18px 16px; border-radius: 20px; }
      #pin-section,
      #login-section,
      #upload-section { padding-top: clamp(8px, 2vh, 16px); }

      .login-icon {
        width: clamp(44px, 8vw, 56px);
        height: clamp(44px, 8vw, 56px);
        margin-bottom: clamp(8px, 2vh, 14px);
        border-radius: 14px;
      }
      .card-title {
        font-size: clamp(19px, 5vw, 24px);
        margin-bottom: clamp(6px, 1.5vh, 12px);
      }
      .card-title em { font-size: 16px; }
      .card-sub { margin-bottom: clamp(10px, 2vh, 18px); font-size: 12px; }

      .quote-wrap { min-height: 50px; margin-bottom: clamp(8px, 2vh, 16px); }
      .quote { font-size: 13px; line-height: 1.5; }

      #login-section .field { margin-bottom: 10px; }
      #login-section .btn { margin-top: 12px; }

      input[type="email"],
      input[type="password"],
      input[type="date"],
      input[type="number"] { padding: 11px 12px; font-size: 15px; }

      .dz { padding: clamp(10px, 2.5vh, 18px) 12px; margin-bottom: 10px; }
      .dz-icon { font-size: 28px; margin-bottom: 4px; }
      .dz-main { font-size: 13px; }

      input[type="date"] { min-height: 46px; padding: 12px 12px; }

      .dp { padding: clamp(7px, 1.5vh, 11px) 6px; font-size: 13px; }
      .dp span { font-size: 11px; }
      .date-pills { margin-top: 8px; }
      .dp-row { gap: 8px; }

      .field { margin-bottom: clamp(6px, 1.5vh, 12px); }
      .btn { min-height: 46px; font-size: 14px; margin-top: 6px; }

      .alert { margin-top: 8px; padding: 10px 12px; font-size: 12px; }

      .ecg { height: 34px; margin-top: 10px; }

      .pin-box { width: 76px; height: 64px; font-size: 26px; }
    }

    /* Ekstra kompakt på svært små skjermer (iPhone SE o.l.) */
    @media (max-width: 679px) and (max-height: 640px) {
      .login-icon { width: 40px; height: 40px; margin-bottom: 6px; }
      .card { padding: 14px 14px; }
      .card-title { font-size: 18px; margin-bottom: 6px; }
      .quote-wrap { min-height: 42px; margin-bottom: 8px; }
      .quote { font-size: 12px; }
      .dz { padding: 8px 10px; margin-bottom: 8px; }
      .dz-icon { font-size: 22px; margin-bottom: 2px; }
      input[type="email"],
      input[type="password"] { padding: 9px 10px; }
      .btn { min-height: 42px; }
      .ecg { display: none; }
    }
  </style>
</head>
<body>

<div id="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
  <div class="blob b6"></div>
  <div class="blob b7"></div>
  <div class="b8"></div>
</div>

<header>
  <div id="user-info">
    <span id="display-name"></span>
    <button class="pill" onclick="logout()">Logg ut</button>
  </div>
</header>

<main>

  <div class="card" id="pin-section">
    <div class="login-icon"><img src="/apple-touch-icon.png" alt=""></div>
    <div class="card-title">Lås opp</div>
    <form id="pin-form" onsubmit="doPin(event)">
      <div class="pin-grid">
        <input class="pin-box" id="p0" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" autocomplete="one-time-code"
               placeholder="XX">
        <span class="pin-sep">:</span>
        <input class="pin-box" id="p1" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" placeholder="XX">
        <span class="pin-sep">:</span>
        <input class="pin-box" id="p2" type="tel" inputmode="numeric"
               maxlength="2" pattern="[0-9]*" placeholder="XX">
      </div>
    </form>
    <div class="alert" id="pin-alert"></div>
  </div>

  <div class="card" id="login-section">
    <div class="login-icon"><img src="/apple-touch-icon.png" alt=""></div>
    <div class="card-sub">Logg inn med din Garmin Connect-konto</div>
    <div class="quote-wrap">
      <div class="quote" id="q0"></div>
      <div class="quote" id="q1"></div>
    </div>
    <form onsubmit="doLogin(event)">
      <div class="field">
        <input type="email" id="email" placeholder="E-post"
               required autocomplete="email">
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Passord"
               required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-btn">Logg inn</button>
    </form>
    <div class="alert" id="login-alert"></div>
  </div>

  <div class="card" id="upload-section">
    <div class="login-icon"><img src="/apple-touch-icon.png" alt=""></div>
    <div class="card-title">Last opp økt<em>til Garmin Connect</em></div>

    <div class="upload-cols">
    <div class="upload-col-left">
      <!-- File picker -->
      <div class="dz" id="dz"
           onclick="document.getElementById('file-input').click()"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)">
        <span class="dz-icon">📂</span>
        <div class="dz-main">Trykk for å velge fil</div>
        <div class="dz-hint">
          <b>JSON</b> for planlagte fremtidige økter
          &nbsp;·&nbsp; FIT / TCX / GPX for aktiviteter
        </div>
        <!-- Selected state -->
        <div class="dz-selected">
          <div class="dz-badge" id="file-badge">JSON</div>
          <div class="dz-fname" id="file-label"></div>
          <div class="dz-change">Bytt</div>
        </div>
      </div>
      <input type="file" id="file-input" accept=".json,.fit,.tcx,.gpx"
             onchange="onFileInput(this)">
    </div>

    <div class="upload-col-right">
      <!-- Date picker -->
      <div class="field">
        <div class="date-wrap" id="date-wrap">
          <input type="date" id="sched-date">
          <span class="date-ph">Planlegg til dato — valgfritt</span>
        </div>
        <div class="date-pills">
          <div class="dp-row">
            <button type="button" class="dp" onclick="setDate(0,this)">I dag<span id="date-today"></span></button>
            <button type="button" class="dp" onclick="setDate(1,this)">I morgen<span id="date-tomorrow"></span></button>
          </div>
        </div>
      </div>
      <button class="btn" id="upload-btn" onclick="doUpload()" disabled>
        Last opp til Garmin
      </button>
      <div class="alert" id="upload-alert"></div>
    </div>
    </div><!-- /.upload-cols -->

    <!-- ECG heartbeat line — spans full width below both columns -->
    <svg class="ecg" viewBox="0 0 400 48" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="ecg-grad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="18%"  stop-color="#00ffcc"/>
          <stop offset="38%"  stop-color="#ffffff"/>
          <stop offset="55%"  stop-color="#a78bfa"/>
          <stop offset="74%"  stop-color="#38bdf8"/>
          <stop offset="88%"  stop-color="#00ffcc"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
        </linearGradient>
      </defs>
      <path class="ecg-path" fill="none" stroke="url(#ecg-grad)" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"
        d="M0,24 L12,24 L16,20 L19,24 L21,24 L23,4 L25,44 L27,24 L34,28 L46,24 L84,24
           L96,24 L100,20 L103,24 L105,24 L107,4 L109,44 L111,24 L118,28 L130,24 L168,24
           L180,24 L184,20 L187,24 L189,24 L191,4 L193,44 L195,24 L202,28 L214,24 L252,24
           L264,24 L268,20 L271,24 L273,24 L275,4 L277,44 L279,24 L286,28 L298,24 L336,24
           L348,24 L352,20 L355,24 L357,24 L359,4 L361,44 L363,24 L370,28 L382,24 L400,24"/>
    </svg>
  </div>

</main>

<script>
  // screen.height = full physical screen height in CSS px, browser-chrome-independent.
  let sel = null;

  const dateInput = document.getElementById('sched-date');
  const today = new Date();
  dateInput.min = today.toISOString().slice(0,10);
  const dateWrap = document.getElementById('date-wrap');
  function refreshDateDisplay() {
    const ph = document.querySelector('.date-ph');
    if (!ph) return;
    if (dateInput.value) {
      const [y, m, d] = dateInput.value.split('-').map(Number);
      ph.textContent = new Date(y, m - 1, d).toLocaleDateString('no-NO', { day: 'numeric', month: 'long', year: 'numeric' });
    } else {
      ph.textContent = 'Planlegg til dato — valgfritt';
    }
  }

  dateInput.addEventListener('change', () => {
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
    dateWrap.classList.toggle('has-date', !!dateInput.value);
    refreshDateDisplay();
  });

  // Fill date labels in quick-select buttons
  const fmt = d => d.toLocaleDateString('no-NO', { day: 'numeric', month: 'short' });
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  document.getElementById('date-today').textContent    = fmt(today);
  document.getElementById('date-tomorrow').textContent = fmt(tomorrow);

  function setDate(days, btn) {
    const d = new Date();
    d.setDate(d.getDate() + days);
    dateInput.value = d.toISOString().slice(0,10);
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
    btn.classList.add('sel');
    dateWrap.classList.add('has-date');
    refreshDateDisplay();
  }

  async function init() {
    const r = await fetch('/api/status').catch(() => null);
    if (!r) { show('login'); return; }
    if (r.status === 401) { show('pin'); return; }
    const d = await r.json();
    d.loggedIn ? setIn(d.displayName) : show('login');
  }

  // ── Kipchoge quotes ───────────────────────────────────────
  const QUOTES = [
    { text: "No human is limited.", who: "Eliud Kipchoge" },
    { text: "Only the disciplined ones in life are free.", who: "Eliud Kipchoge" },
    { text: "It's not about the legs; it's about the heart and mind.", who: "Eliud Kipchoge" },
    { text: "To win a race, the feet must follow the head.", who: "Eliud Kipchoge" },
    { text: "In athletics, you learn that if you quit once, it becomes a habit.", who: "Eliud Kipchoge" },
    { text: "You can only run a marathon if you practice daily.", who: "Eliud Kipchoge" },
    { text: "Winning is about being mentally prepared.", who: "Eliud Kipchoge" },
    { text: "I run to make history.", who: "Eliud Kipchoge" },
  ];
  let _quoteIdx = Math.floor(Math.random() * QUOTES.length);
  let _quoteTimer = null;
  let _activeQ = 0;

  function _qEls() { return [document.getElementById('q0'), document.getElementById('q1')]; }

  function showNextQuote() {
    const els = _qEls();
    const next = 1 - _activeQ;
    _quoteIdx = (_quoteIdx + 1) % QUOTES.length;
    const q = QUOTES[_quoteIdx];
    els[next].innerHTML = `"${q.text}" <cite>— ${q.who}</cite>`;
    // cross-fade: new in, old out simultaneously
    els[next].classList.add('visible');
    els[_activeQ].classList.remove('visible');
    _activeQ = next;
  }

  function startQuotes() {
    const els = _qEls();
    clearInterval(_quoteTimer);
    els.forEach(e => { e.classList.remove('visible'); e.innerHTML = ''; });
    const q = QUOTES[_quoteIdx];
    els[0].innerHTML = `"${q.text}" <cite>— ${q.who}</cite>`;
    _activeQ = 0;
    setTimeout(() => els[0].classList.add('visible'), 80);
    _quoteTimer = setInterval(showNextQuote, 7000);
  }

  function stopQuotes() {
    clearInterval(_quoteTimer);
    _qEls().forEach(e => e.classList.remove('visible'));
  }

  // ── Confetti ──────────────────────────────────────────────
  function launchConfetti() {
    const W = window.innerWidth, H = window.innerHeight;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    Object.assign(canvas.style, {
      position: 'fixed', top: 0, left: 0,
      width: '100%', height: '100%',
      zIndex: 9999, pointerEvents: 'none',
    });
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const COLORS = ['#00d4aa','#7b2fff','#3a86ff','#06ffa5','#ff006e','#ffbe00','#ffffff'];

    const pieces = Array.from({ length: 100 }, () => ({
      x: W * 0.2 + Math.random() * W * 0.6,
      y: H * 0.55,
      vx: (Math.random() - 0.5) * 16,
      vy: -(Math.random() * 20 + 8),
      g: 0.55,
      rot: Math.random() * 360,
      rs: (Math.random() - 0.5) * 9,
      w: Math.random() * 10 + 5,
      h: Math.random() * 5 + 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    }));

    const start = performance.now();
    const dur = 2600;

    (function frame(now) {
      const t = (now - start) / dur;
      ctx.clearRect(0, 0, W, H);
      pieces.forEach(p => {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.rs;
        const alpha = Math.max(0, 1 - Math.max(0, t - 0.45) * 2.2);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      t < 1 ? requestAnimationFrame(frame) : canvas.remove();
    })(start);
  }

  function show(n) {
    ['pin','login','upload'].forEach(s =>
      document.getElementById(s + '-section').style.display = s === n ? 'block' : 'none');
    if (n === 'pin') setTimeout(() => document.getElementById('p0').focus(), 60);
    if (n === 'login') startQuotes();
    else stopQuotes();
  }

  function setIn(name) {
    show('upload');
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('display-name').textContent = name;
  }

  // ── PIN boxes ─────────────────────────────────────────────
  const pinBoxes = [
    document.getElementById('p0'),
    document.getElementById('p1'),
    document.getElementById('p2'),
  ];

  pinBoxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      // strip non-digits, enforce max 2
      box.value = box.value.replace(/\D/g, '').slice(0, 2);
      box.classList.toggle('filled', box.value.length > 0);
      if (box.value.length === 2) {
        if (i < 2) {
          pinBoxes[i + 1].focus();
        } else {
          // last box filled — auto-submit
          document.getElementById('pin-form').requestSubmit();
        }
      }
    });

    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && box.value === '' && i > 0) {
        e.preventDefault();
        const prev = pinBoxes[i - 1];
        prev.value = prev.value.slice(0, -1);
        prev.classList.toggle('filled', prev.value.length > 0);
        prev.focus();
      }
    });

    // handle paste across all boxes (e.g. from SMS OTP)
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      pinBoxes.forEach((b, j) => {
        b.value = digits.slice(j * 2, j * 2 + 2);
        b.classList.toggle('filled', b.value.length > 0);
      });
      if (digits.length === 6) {
        document.getElementById('pin-form').requestSubmit();
      } else {
        const next = pinBoxes[Math.min(Math.floor(digits.length / 2), 2)];
        next.focus();
      }
    });
  });

  async function doPin(e) {
    if (e) e.preventDefault();
    const pin = pinBoxes.map(b => b.value).join('');
    if (pin.length < 6) {
      alert2('pin-alert', 'Skriv inn alle 6 sifrene', 'error');
      return;
    }
    alert2('pin-alert', '', '');
    pinBoxes.forEach(b => { b.disabled = true; });
    try {
      const fd = new FormData();
      fd.append('pin', pin);
      const r = await fetch('/api/pin', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        const s = await (await fetch('/api/status')).json();
        s.loggedIn ? setIn(s.displayName) : show('login');
      } else {
        alert2('pin-alert', d.detail || 'Feil PIN', 'error');
        pinBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); b.disabled = false; });
        pinBoxes[0].focus();
      }
    } catch(e) {
      alert2('pin-alert', 'Nettverksfeil', 'error');
      pinBoxes.forEach(b => { b.disabled = false; });
    }
  }

  async function doLogin(e) {
    e.preventDefault();
    const b = document.getElementById('login-btn');
    alert2('login-alert', '', '');
    b.disabled = true; b.innerHTML = '<span class="spinner"></span>Logger inn…';
    try {
      const fd = new FormData();
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      const r = await fetch('/api/login', { method: 'POST', body: fd });
      const d = await r.json();
      r.ok ? setIn(d.displayName) : alert2('login-alert', d.detail || 'Innlogging feilet', 'error');
    } catch(e) { alert2('login-alert', 'Nettverksfeil', 'error'); }
    finally { b.disabled = false; b.innerHTML = 'Logg inn'; }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    sel = null;
    document.getElementById('dz').classList.remove('has-file');
    document.getElementById('file-label').textContent = '';
    document.getElementById('upload-btn').disabled = true;
    alert2('upload-alert', '', '');
    document.getElementById('user-info').style.display = 'none';
    show('login');
  }

  function onDragOver(e) { e.preventDefault(); document.getElementById('dz').classList.add('over'); }
  function onDragLeave() { document.getElementById('dz').classList.remove('over'); }
  function onDrop(e) {
    e.preventDefault();
    document.getElementById('dz').classList.remove('over');
    const f = e.dataTransfer.files[0]; if (f) setFile(f);
  }
  function onFileInput(i) { if (i.files[0]) setFile(i.files[0]); }

  function setFile(f) {
    sel = f;
    const ext = f.name.split('.').pop().toLowerCase();
    const badge = document.getElementById('file-badge');
    badge.textContent = ext.toUpperCase();
    badge.className = 'dz-badge type-' + (ext === 'json' ? 'json' : 'fit');
    document.getElementById('file-label').textContent = f.name;
    document.getElementById('dz').classList.add('has-file');
    document.getElementById('upload-btn').disabled = false;
    alert2('upload-alert', '', '');
  }

  async function doUpload() {
    if (!sel) return;
    const b = document.getElementById('upload-btn');
    const dv = dateInput.value;
    b.disabled = true; b.innerHTML = '<span class="spinner"></span>Laster opp…';
    alert2('upload-alert', '', '');
    try {
      const fd = new FormData();
      fd.append('file', sel);
      if (dv) fd.append('scheduled_date', dv);
      const r = await fetch('/api/upload', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        alert2('upload-alert', d.message, d.scheduled ? 'success' : 'warning');
        if (d.scheduled) { launchConfetti(); reset(); }
        else launchConfetti();
      } else {
        alert2('upload-alert', d.detail || 'Opplasting feilet', 'error');
      }
    } catch(e) { alert2('upload-alert', 'Nettverksfeil', 'error'); }
    finally { b.disabled = !sel; b.innerHTML = 'Last opp til Garmin'; }
  }

  function reset() {
    sel = null;
    document.getElementById('dz').classList.remove('has-file');
    document.getElementById('file-label').textContent = '';
    document.getElementById('file-input').value = '';
    dateInput.value = '';
    dateWrap.classList.remove('has-date');
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('sel'));
    document.getElementById('upload-btn').disabled = true;
    refreshDateDisplay();
  }

  function alert2(id, msg, type) {
    const el = document.getElementById(id);
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.style.display = 'block';
  }

  init().catch(() => show('login'));
</script>
</body>
</html>
